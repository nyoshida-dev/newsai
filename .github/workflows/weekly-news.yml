name: AI News
on:
  schedule:
    # :13 past the hour — GitHub delays/drops top-of-hour (esp. 00:00 UTC) runs.
    # 00:13 UTC = 09:13 JST. Kept in sync with dashboard schedule.ts jitter.
    - cron: "13 0 * * *"
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider (empty = repo var LLM_PROVIDER)"
        required: false
        type: choice
        options: ["", "api", "codex", "claude", "opencode"]
      dry_run:
        description: "Generate but do not post to Slack"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
concurrency:
  group: weekly-slack-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # 空なら config.toml の [llm].provider が使われる（優先順位: input > repo var > config.toml）
      LLM_PROVIDER: ${{ inputs.provider || vars.LLM_PROVIDER || '' }}
      LLM_MODEL: ${{ vars.LLM_MODEL }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
      SLACK_EXCLUDE_CHANNELS: ${{ secrets.SLACK_EXCLUDE_CHANNELS }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve effective provider
        run: |
          EFFECTIVE=$(python3 -c 'import os,pathlib,tomllib
          p=os.environ.get("LLM_PROVIDER") or ""
          if not p:
              cfg=pathlib.Path("config.toml")
              if cfg.is_file():
                  p=str(tomllib.load(cfg.open("rb")).get("llm",{}).get("provider",""))
          print(p or "api")')
          echo "EFFECTIVE_PROVIDER=$EFFECTIVE" >> "$GITHUB_ENV"
          echo "実効プロバイダ: $EFFECTIVE"

      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.13
      - run: uv sync --frozen

      - name: Setup Node 22 (CLI providers)
        if: env.EFFECTIVE_PROVIDER != 'api'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Codex CLI
        if: env.EFFECTIVE_PROVIDER == 'codex'
        run: npm install -g @openai/codex
      - name: Seed Codex auth (ChatGPT subscription)
        if: env.EFFECTIVE_PROVIDER == 'codex'
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          mkdir -p ~/.codex && chmod 700 ~/.codex
          printf '%s' "$CODEX_AUTH_JSON" > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json

      - name: Install Claude Code CLI
        if: env.EFFECTIVE_PROVIDER == 'claude'
        run: npm install -g @anthropic-ai/claude-code

      - name: Install opencode
        if: env.EFFECTIVE_PROVIDER == 'opencode'
        run: npm install -g opencode-ai
      - name: Seed opencode auth
        if: env.EFFECTIVE_PROVIDER == 'opencode'
        env:
          OPENCODE_AUTH_JSON: ${{ secrets.OPENCODE_AUTH_JSON }}
        run: |
          if [ -n "$OPENCODE_AUTH_JSON" ]; then
            mkdir -p ~/.local/share/opencode
            printf '%s' "$OPENCODE_AUTH_JSON" > ~/.local/share/opencode/auth.json
            chmod 600 ~/.local/share/opencode/auth.json
          fi

      - name: Configure opencode custom provider
        if: env.EFFECTIVE_PROVIDER == 'opencode'
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import tomllib

          if not os.environ.get("OPENCODE_API_KEY"):
              raise SystemExit
          config_path = pathlib.Path("config.toml")
          if not config_path.is_file():
              raise SystemExit
          llm = tomllib.load(config_path.open("rb")).get("llm", {})
          opencode = llm.get("opencode", {})
          base_url = str(opencode.get("base_url", "")).strip()
          if not base_url:
              raise SystemExit
          npm = str(opencode.get("npm", "")).strip() or "@ai-sdk/openai-compatible"
          provider_id = str(opencode.get("provider_id", "")).strip() or "custom"
          data = {
              "provider": {
                  provider_id: {
                      "npm": npm,
                      "options": {
                          "baseURL": base_url,
                          "apiKey": "{env:OPENCODE_API_KEY}",
                      },
                  }
              }
          }
          target = pathlib.Path.home() / ".config/opencode/opencode.json"
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(json.dumps(data, ensure_ascii=False) + "\n")
          target.chmod(0o600)
          PY

      - name: LLM smoke test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: uv run python llm_providers.py --prompt "1+1は？数字のみ回答してください。"

      - name: Run weekly summary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: uv run python main.py ${{ inputs.dry_run == true && '--dry-run' || '' }}
