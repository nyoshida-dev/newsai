# newsai config — edited via dashboard; comments are not preserved on save.

[llm]
provider = "codex"
model = "gpt-5.6-sol"
base_url = ""
api_key_env = "OPENAI_API_KEY"
max_completion_tokens = 15000
timeout_seconds = 600
extra_cli_args = []

[llm.opencode]
base_url = ""
npm = "@ai-sdk/openai-compatible"
provider_id = "custom"

[prompt]
system = """
あなたはAIに関する最新情報をリサーチする専門家です。
WebおよびXから最新の正しいAIニュースを収集し、重要な情報を抽出し、わかりやすくまとめることを得意としています。"""
instruction = """
#指示
収集した最新のAIニュースから、「話題のニュース」として取り上げるのに良さそうなものをピックアップして「今日の注目ニュース」として取り上げるのにふさわしいものをピックアップしてください。

- 上位10件の「今日の注目ニュース」を選んでください。
- 番外編は2〜5件選んでください。
- 出力結果には【注目ニュース】と【番外編】の2つのセクションを作成してください。
- 【注目ニュース】は、実際にプロダクトやサービスとして使える発表を優先してください。具体的には、OpenAI・Anthropic（Claude）・Google（Gemini）・Meta・xAI などAIベンダーの新モデル発表、リリースノート、API・新機能のアップデート、そしてソフトウェア開発に使える各種サービス・ツール・SDK・IDE拡張のリリースやアップデートです。
- 学術論文（arXiv など）は原則として【注目ニュース】に含めず、特に影響が大きいものだけを【番外編】に少数だけ回してください。
- 規制・法制度・政府方針・国際会議・訴訟、企業提携・資金調達・組織再編、単なる製品改称やブランド変更、調査・アンケートレポートは【注目ニュース】に含めないでください。特に重要なものだけ【番外編】に回してください。
- 各ニュースには具体的な情報（モデル名・バージョン、対応言語やモダリティ、主要な新機能、価格やプラン、提供開始日など）を最低1つ含めてください。
- ソフトウェア開発・業務で実際に使えるかどうかを重視してください。
- 事実確認できない噂は除外してください。
- 各ニュースの最後に出典URLを1行で記載してください（・ 出典: <URL>）。
- 出力結果には枕詞や最後のコメントは含めないでください。

#出力形式
- 各ニュースの間には必ず空行を1行入れてください。
- ニュースタイトル。タイトルの先頭にニュースの番号を付けてください。ニュースの最後にはタイトルに対応する絵文字を付けてください。ニュースタイトルは*で囲んでください。
- 詳細説明（1-2文）。200字以内程度。
- 最後の行に出典URLを記載してください。

例：
【注目ニュース】

1. *ニュースタイトル* 絵文字
・ 詳細説明をここに記載します。
・ 出典: https://example.com/article

2. *次のニュースタイトル* 絵文字
・ 詳細説明をここに記載します。
・ 出典: https://example.com/article2

【番外編】

1. *ニュースタイトル* 絵文字
・ 詳細説明をここに記載します。
・ 出典: https://example.com/extra
"""
instruction_file = ""

[collect]
source = "web"
days = 2
channel_filter = ""
exclude_channels = []
max_messages_per_channel = 100
max_message_chars = 500
auto_join = true

[collect.web]
mode = "llm_search"
queries = ["OpenAI 新モデル リリース 発表", "Anthropic Claude アップデート 新機能", "Google Gemini 新モデル 発表", "AI 開発者向け ツール SDK リリース", "生成AI API 新機能 アップデート"]
feeds = []
max_items_per_feed = 20

[post]
channel = "C07LLA7M8CE"
thread = true
header = "📰 今日のAIニュース"

[schedule]
frequency = "daily"
weekday = "monday"
hour = 9
timezone = "Asia/Tokyo"
