# newsai 設定ファイルの例です。
# このファイルを config.toml にコピーして編集してください。
# 秘密情報はここに書かず、環境変数名のみ指定します（api_key_env）。

[llm]
# 利用する LLM プロバイダ: api | codex | claude | opencode
provider = "api"
# モデル名。空文字の場合はプロバイダのデフォルト（api は gpt-5.5）
model = ""
# OpenAI 互換 API の base URL。空文字の場合は OpenAI 公式エンドポイント
base_url = ""
# API キーを読む環境変数名（実際のキーは .env / Secrets に置く）
api_key_env = "OPENAI_API_KEY"
# 生成の最大トークン数（api プロバイダのみ）
max_completion_tokens = 15000
# タイムアウト秒数
timeout_seconds = 600
# CLI プロバイダに追加で渡す引数
extra_cli_args = []

[prompt]
# システムプロンプト
system = "あなたは社内コミュニケーションの専門家です。Slackメッセージから重要な情報を抽出し、わかりやすくまとめることが得意です。"
# ユーザー指示プロンプト（メッセージ本文の直前に付与される）
instruction = """#指示
以下のSlackメッセージから、「話題のニュース」として取り上げるのに良さそうなものをピックアップして「今週の注目ニュース」として取り上げるのにふさわしいものをピックアップしてください。

- 上位10件の「今週の注目ニュース」を選んでください。
- 外部のニュースは取り上げないでください。
- もし重要なニュースが見つからない場合は、「今週は特に重要なニュースはありませんでした」と返してください。
- ネガティブなニュースは取り上げないでください。
- 番外編として、ユーモアのあるニュースを5件選んでください。
- 出力結果には【注目ニュース】と【番外編】の2つのセクションを作成してください。
- 出力結果には枕詞や最後のコメントは含めないでください。

#出力形式
- 各ニュースの間には必ず空行を1行入れてください。
- ニュースタイトル。タイトルの先頭にニュースの番号を付けてください。ニュースの最後にはタイトルに対応する絵文字を付けてください。ニュースタイトルは*で囲んでください。
- 詳細説明（1-2文）。200字以内程度。
- 最後の行に、チャンネル名を記載してください。チャンネル名は必ず行頭に#から始めてください（Slackがリンクとして認識するため）。

例：
【注目ニュース】

1. *ニュースタイトル* 絵文字
・ 詳細説明をここに記載します。
・ #channel_name

2. *次のニュースタイトル* 絵文字
・ 詳細説明をここに記載します。
・ #channel_name

【番外編】

1. *ニュースタイトル* 絵文字
・ 詳細説明をここに記載します。
・ #channel_name

#Slackメッセージ
Slackメッセージはある会社内でやり取りされた1週間分のメッセージです。各メッセージには投稿者名が[名前]の形式で含まれています。
"""
# 指定時はこのファイル内容で instruction を上書きする
instruction_file = ""

[collect]
# 収集対象の日数
days = 7
# チャンネル名フィルタ（部分一致）。空文字で全チャンネル
channel_filter = ""
# 除外チャンネル名のリスト（SLACK_EXCLUDE_CHANNELS 環境変数と union）
exclude_channels = []
# チャンネルあたり分析に使う最新メッセージ数
max_messages_per_channel = 100
# 1メッセージあたりの最大文字数
max_message_chars = 500
# 未参加の公開チャンネルへ自動参加するか
auto_join = true

[post]
# 投稿先チャンネル。SLACK_CHANNEL 環境変数が設定されていればそちらを優先
channel = ""
# 長文をスレッドに分割投稿するか
thread = true
# ヘッダー接頭辞。空文字の場合はデフォルト（📰 今週の社内ニュース - …）
header = ""
